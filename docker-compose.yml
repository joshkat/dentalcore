services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-dentalcore}
      POSTGRES_USER: ${DB_USER:-dentalcore}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dentalcore}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dentalcore} -d ${DB_NAME:-dentalcore}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-dentalcore}
      DB_USER: ${DB_USER:-dentalcore}
      DB_PASSWORD: ${DB_PASSWORD:-dentalcore}
      # Empty/unset falls back to a dev-only key. Always set a real one outside dev.
      JWT_SECRET: ${JWT_SECRET:-ZGV2LW9ubHktc2VjcmV0LWtleS1mb3ItbG9jYWwtZGV2ZWxvcG1lbnQtbXVzdC1iZS1sb25nLWVub3VnaC1mb3ItaHM1MTItc2lnbmluZy1kby1ub3QtdXNlLWluLXByb2Q=}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@dentalcore.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin-1}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # Dev default also admits private-LAN devices hitting the Vite dev server.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://192.168.*.*:5173,http://10.*.*.*:5173,http://172.*.*.*:5173,http://*.local:5173}
      DOCUMENT_STORAGE_PATH: /data/documents
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      # Dev-only headroom: the Playwright suite logs in ~once per test and
      # brushes the default 15/min auth rate limit. Prod keeps the default.
      DENTALCORE_SECURITY_RATELIMIT_MAXREQUESTS: ${AUTH_RATE_LIMIT:-60}
    ports:
      - "8080:8080"
    volumes:
      - documents:/data/documents
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_URL: http://backend:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  pgdata:
  documents:
